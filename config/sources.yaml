# RSS·Atom 피드 및 소스 가중치
# 회사 매칭은 config/keywords.yaml + 제목/요약 텍스트 기준 (피드별 default_company는 선택)

defaults:
  source_reliability: 0.5
  request_timeout_seconds: 25
  user_agent: "MarketIntelPhysicalAI/1.0 (+research)"

feeds:
  - id: arxiv_cs_ro
    url: "http://export.arxiv.org/rss/cs.RO"
    source_reliability: 0.88
    source_type: research_feed
    themes_hint:
      - embodied_ai_platforms
      - simulation_digital_twin
    notes: "로보틱스 학술·프리프린트"

  - id: techcrunch_robotics
    url: "https://techcrunch.com/tag/robotics/feed/"
    source_reliability: 0.55
    source_type: news
    themes_hint:
      - humanoid_supply_chain
      - embodied_ai_platforms
    notes: "뉴스 재인용 가능 — 검증 단계 권장"

  - id: ieee_spectrum_robotics
    url: "https://spectrum.ieee.org/feeds/topic/robotics.rss"
    source_reliability: 0.72
    source_type: news
    themes_hint:
      - embodied_ai_platforms
    notes: "IEEE Spectrum Robotics"

# 특정 피드 항목을 기본 회사에 태그할 때 (키워드 매칭 실패 시 보조). 예:
# feed_default_company:
#   techcrunch_robotics: figure_ai
feed_default_company: {}
