name: Intel weekly report

on:
  schedule:
    - cron: "15 7 * * 1"
  workflow_dispatch: {}

jobs:
  weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - run: pip install -r pipeline/requirements.txt

      - name: Run weekly
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: pipeline
        run: python -m intel_pipeline weekly

      - name: Commit report + state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-intel/reports pipeline/state pipeline/logs
          git diff --staged --quiet || (git commit -m "intel: weekly strategy" && git push)
