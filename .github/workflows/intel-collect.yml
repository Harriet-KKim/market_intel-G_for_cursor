name: Intel collect (RSS)

on:
  schedule:
    - cron: "0 6,12,18 * * *"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - run: pip install -r pipeline/requirements.txt

      - name: Run collect
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: pipeline
        run: python -m intel_pipeline collect

      - name: Commit vault + state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-intel pipeline/state pipeline/logs
          git diff --staged --quiet || (git commit -m "intel: RSS collect" && git push)
